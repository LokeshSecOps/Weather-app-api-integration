<!DOCTYPE html>
<html lang="en">
<head>
  <title>Weather App - API Integration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 350px;
    }
    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }
    .weather {
      margin-top: 20px;
      font-size: 18px;
    }
    .temp {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🌤 Weather App</h2>
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>
    <div class="weather" id="weather"></div>
  </div>

  <script>
    async function getWeather() {
      const city = document.getElementById("city").value;
      if (!city) {
        alert("Please enter a city name");
        return;
      }

      const apiKey = "20dd819e84msh945ee47b79ff88cp19dab0jsn8a0752b2fb6e"; 
      const url = `https://weather-by-api-ninjas.p.rapidapi.com/v1/weather?city=${apiKey}&q=${city}&aqi=no`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.error) {
          document.getElementById("weather").innerHTML = `<p>❌ City not found!</p>`;
          return;
        }

        document.getElementById("weather").innerHTML = `
          <p><strong>${data.location.name}, ${data.location.country}</strong></p>
          <p class="temp">${data.current.temp_c} °C</p>
          <p>${data.current.condition.text}</p>
          <p>Humidity: ${data.current.humidity}%</p>
          <p>Wind Speed: ${data.current.wind_kph} kph</p>
        `;
      } catch (error) {
        document.getElementById("weather").innerHTML = `<p>⚠️ Error fetching data</p>`;
      }
    }
  </script>
</body>
</html>
